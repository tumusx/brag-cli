name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'chore/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check syntax
        run: node --input-type=module < bin/brag.js 2>&1 | grep -v "^$" || true

      - name: Validate CLI entry point
        run: node -e "import('./bin/brag.js').catch(e => { if (!e.message.includes('Cannot read')) throw e })" 2>/dev/null || true

  demo:
    name: Generate demo brag doc
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure brag (no Jira — demo mode)
        run: |
          node bin/brag.js config \
            --obsidian /tmp/brag-demo \
            --owner tumusx \
            --repo brag-docs

      - name: Setup fake git repo with Jira branch
        run: |
          git config --global user.email "ci@brag-cli.dev"
          git config --global user.name "brag CI"
          mkdir -p /tmp/demo-repo && cd /tmp/demo-repo
          git init
          git checkout -b feature/DEMO-001-ci-validation
          echo "# Demo" > README.md
          git add . && git commit -m "feat: add CI validation for brag-cli"

      - name: Run brag log (demo — no push)
        run: |
          cd /tmp/demo-repo
          node $GITHUB_WORKSPACE/bin/brag.js log --cwd .

      - name: Show generated document
        run: |
          echo "── Generated brag document ──────────────────────"
          cat /tmp/brag-demo/DEMO-001.md
          echo "─────────────────────────────────────────────────"

      - name: Upload brag doc as artifact
        uses: actions/upload-artifact@v4
        with:
          name: brag-demo-DEMO-001
          path: /tmp/brag-demo/DEMO-001.md
          retention-days: 7
